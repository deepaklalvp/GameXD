<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GameXD | Flappy Bird</title>

    <link rel="stylesheet" href="css/flappy.css">
</head>
<body>
    
<div class="navbar">

    <h2 onclick="location.href='home.html'">🎮 GameXD</h2>

    <div class="right">

        <span id="userName">Loading...</span>

        <span id="userPoints">
            ⭐ 0 pts
        </span>

        <button id="logoutBtn">
            Logout
        </button>

    </div>

</div>
<div class="game-container">

    <h2>🐦 Flappy Bird</h2>

    <div id="score">Score : 0</div>

    <canvas id="game"></canvas>
    <div id="countdown">
    3
</div>


    <div id="gameOver" class="hide">
        <h2>Game Over</h2>
        <p id="finalScore"></p>

        <button id="restartBtn">
            Play Again
        </button>

        <button onclick="location.href='home.html'">
            Home
        </button>
    </div>

</div>

<script type="module" src="js/flappy.js"></script>

</body>
</html>
