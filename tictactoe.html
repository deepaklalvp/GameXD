<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameXD | Tic Tac Toe</title>

    <link rel="stylesheet" href="css/tictactoe.css">
    <script type="module" src="./js/tictactoe.js" defer></script>
</head>

<body>

<div class="background"></div>

<!-- Navbar -->
<div class="navbar">

    <h2 onclick="location.href='home.html'" style="cursor:pointer;">
        🎮 GameXD
    </h2>

    <div class="right">
        <span id="userName">Loading...</span>
        <span id="userPoints"> | ⭐ 0 pts</span>
        <button id="logoutBtn">Logout</button>
    </div>

</div>

<!-- Main Content -->
<div class="container">

    <h1>Tic Tac Toe</h1>

    <p id="status">Player X's Turn</p>

    <div id="board" class="board">

        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>

        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>

        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>

    </div>

    <div class="buttons">

        <button id="restartBtn">🔄 Restart</button>

        <button onclick="location.href='home.html'">
            🏠 Home
        </button>

    </div>

</div>

</body>
</html>
