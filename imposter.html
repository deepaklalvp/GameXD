<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <title>GameXD | Impostor</title>

    <link rel="stylesheet" href="css/imposter.css">
    <script type="module" src="./js/imposter.js" defer></script>
</head>

<body>

<div class="background"></div>

<!-- NAVBAR -->
<div class="navbar">

    <h2>🎮 GameXD</h2>

    <div class="right">

        <span id="userName">Loading...</span>
        <span id="userPoints"> | ⭐ 0 pts</span>

        <button onclick="location.href='home.html'">
            <i class="fa-solid fa-house"></i> Home
        </button>

        <button id="logoutBtn">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>

    </div>

</div>

<div class="container">

    <h1>🕵️ Impostor Game</h1>

    <div id="setup">

        <input type="number" id="players"
               placeholder="Number of Players (2-10)">

        <button id="startBtn">
            Start Game
        </button>

    </div>

    <div id="game" style="display:none;">

        <h2 id="playerText"></h2>

        <button id="revealBtn">Reveal</button>

        <div id="roleBox"></div>

        <button id="nextBtn" style="display:none;">
            Pass Device
        </button>

    </div>

</div>

</body>
</html>
